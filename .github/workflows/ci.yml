name: CI – Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY || 'aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa' }}
          SPOTIFY_CLIENT_ID: test-client-id
          SPOTIFY_CLIENT_SECRET: test-client-secret
          SPOTIFY_REDIRECT_URI: http://localhost:4000/auth/callback
          FRONTEND_URL: http://localhost:5173
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          CRON_SECRET: test-cron-secret
          DAILY_PLAYLIST_URL: https://open.spotify.com/playlist/test
          DAILY_TRACK_COUNT: 5